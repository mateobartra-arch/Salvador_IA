<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1D9E75">
<title>Salvador — MISAGI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --v:#1D9E75;--vd:#0F6E56;--vl:#E1F5EE;
  --r:#E24B4A;--rl:#FCEBEB;--a:#EF9F27;--al:#FAEEDA;
  --bg:#f0f2f5;--card:#fff;--border:#e5e7eb;
  --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--f);display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:56px;
  padding-top:var(--safe-top);
  background:var(--v);
  flex-shrink:0;position:relative;z-index:10;
}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-ico{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.tb-ico svg{width:18px;height:18px;fill:white;}
.tb-name{font-size:16px;font-weight:700;color:white;}
.tb-sub{font-size:11px;color:rgba(255,255,255,.7);}
.tb-right{display:flex;align-items:center;gap:8px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:blink 2s infinite;flex-shrink:0;}
.status-txt{font-size:11px;color:rgba(255,255,255,.8);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:flex;background:var(--card);
  border-top:1.5px solid var(--border);
  flex-shrink:0;
  padding-bottom:var(--safe-bottom);
  position:relative;
  z-index:30;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 10px;cursor:pointer;color:var(--txt3);transition:all .15s;border:none;background:none;gap:5px;min-height:56px;}
.bn-item.active{color:var(--v);}
.bn-item.active svg{stroke:var(--v);}
.bn-item svg{width:24px;height:24px;}
.bn-label{font-size:10px;font-weight:600;letter-spacing:.01em;}

/* ── VIEWS ── */
.views{flex:1;overflow:hidden;position:relative;z-index:1;}
.view{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .2s;}
.view.active{opacity:1;pointer-events:all;}

/* ── CHAT ── */
.chat-msgs{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 12px 8px;
  display:flex;flex-direction:column;gap:8px;
  -webkit-overflow-scrolling:touch;
}
.msg{max-width:85%;display:flex;flex-direction:column;}
.msg-label{font-size:10px;font-weight:600;margin-bottom:3px;color:var(--txt3);padding:0 2px;}
.msg-label.sal{color:var(--v);}
.msg-bubble{padding:10px 13px;font-size:15px;line-height:1.5;border-radius:18px;word-break:break-word;}
.msg.sal .msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 18px 18px 18px;color:var(--txt);}
.msg.usr{align-self:flex-end;}
.msg.usr .msg-bubble{background:var(--v);color:white;border-radius:18px 4px 18px 18px;}
.msg.usr .msg-label{text-align:right;}

/* CONFIRM CARD — mobile optimized */
.confirm-card{
  background:white;border:2px solid var(--v);
  border-radius:16px;padding:14px;margin-top:10px;
  box-shadow:0 4px 20px rgba(29,158,117,.15);
}
.confirm-title{font-size:13px;font-weight:700;color:var(--vd);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.cf{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f3f4f6;gap:8px;}
.cf:last-of-type{border:none;}
.cfl{color:var(--txt2);font-size:12px;flex-shrink:0;}
.cfv{font-weight:600;color:var(--txt);font-size:13px;text-align:right;word-break:break-word;}
.confirm-actions{display:flex;gap:8px;margin-top:14px;}
.cbtn{flex:1;padding:12px 8px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.cbtn-ok{background:var(--v);color:white;}
.cbtn-no{background:#f3f4f6;color:var(--txt2);}

/* INPUT BAR */
.input-bar{
  padding:8px 12px;
  padding-bottom:calc(8px + var(--safe-bottom));
  border-top:1px solid var(--border);
  background:var(--card);flex-shrink:0;
}
.photo-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.photo-thumb{width:56px;height:56px;object-fit:cover;border-radius:10px;border:1px solid var(--border);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-ta{
  flex:1;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:22px;
  font-size:15px;font-family:var(--f);
  resize:none;min-height:44px;max-height:120px;
  outline:none;color:var(--txt);background:var(--bg);
  line-height:1.4;
}
.chat-ta:focus{border-color:var(--v);background:white;}
.ib{
  width:44px;height:44px;border-radius:50%;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.ib-mic{background:var(--vl);}
.ib-mic.rec{background:var(--r);animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.4)}50%{box-shadow:0 0 0 10px rgba(226,75,74,0)}}
.ib-mic svg{fill:var(--v);}
.ib-mic.rec svg{fill:white;}
.ib-img{background:#f3f4f6;}
.ib-img svg{fill:var(--txt2);}
.ib-send{background:var(--v);}
.ib-send svg{fill:white;}
.ib-speak{background:var(--vl);position:relative;}
.ib-speak.speaking{background:var(--v);animation:pulse 1.5s ease-in-out infinite;}
.ib-speak svg{fill:var(--v);}
.ib-speak.speaking svg{fill:white;}
.voice-off{background:#f3f4f6;}
.voice-off svg{fill:var(--txt3);}
#photoInput{display:none;}

/* UNIDADES DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-radius:24px 24px 0 0;
  z-index:51;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:70vh;display:flex;flex-direction:column;
  padding-bottom:var(--safe-bottom);
}
.drawer.open{transform:translateY(0);}
.drawer-handle{width:40px;height:4px;background:#d1d5db;border-radius:2px;margin:12px auto 8px;}
.drawer-head{padding:4px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.drawer-title{font-size:16px;font-weight:700;}
.drawer-close{width:30px;height:30px;border:none;background:#f3f4f6;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.drawer-body{overflow-y:auto;flex:1;padding:8px 0;}
.drawer-section{padding:8px 20px 4px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;}
.drawer-item{display:flex;justify-content:space-between;align-items:center;padding:13px 20px;cursor:pointer;transition:all .12s;border-bottom:1px solid #fafafa;}
.drawer-item:active{background:#f9fafb;}
.drawer-item.active{background:var(--vl);}
.di-left{display:flex;align-items:center;gap:10px;}
.di-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.drawer-item.active .di-dot{background:var(--v);}
.di-name{font-size:15px;font-weight:500;color:var(--txt);}
.drawer-item.active .di-name{color:var(--vd);font-weight:600;}
.di-badge{font-size:12px;padding:2px 8px;border-radius:12px;background:#f3f4f6;color:var(--txt2);}
.drawer-item.active .di-badge{background:var(--v);color:white;}

/* HEADER DE CHAT CON UNIDAD ACTIVA */
.chat-header{
  padding:10px 16px;background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ch-unit{display:flex;align-items:center;gap:8px;}
.ch-unit-name{font-size:14px;font-weight:600;color:var(--txt);}
.ch-unit-sub{font-size:11px;color:var(--txt2);}
.ch-btn{padding:6px 12px;border:1.5px solid var(--v);border-radius:20px;background:white;color:var(--vd);font-size:12px;font-weight:600;cursor:pointer;}

/* HISTORIAL MOBILE */
.view-head-mobile{padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.vh-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.vh-filters-mobile{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.vh-filters-mobile::-webkit-scrollbar{display:none;}
.fi{padding:7px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-family:var(--f);background:white;color:var(--txt);outline:none;white-space:nowrap;flex-shrink:0;}
.fi:focus{border-color:var(--v);}
.fi-search{width:100%;border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:15px;}

.hist-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.falla-card{
  margin:8px 12px;background:var(--card);
  border-radius:14px;padding:14px;
  border:1px solid var(--border);
}
.fc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.fc-placa{font-size:15px;font-weight:700;color:var(--txt);}
.fc-fecha{font-size:12px;color:var(--txt2);}
.fc-desc{font-size:14px;color:var(--txt);line-height:1.4;margin-bottom:8px;}
.fc-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;}
.bv{background:var(--vl);color:var(--vd);}
.br{background:var(--rl);color:#a32d2d;}
.ba{background:var(--al);color:#854f0b;}
.bg{background:#f3f4f6;color:var(--txt2);}
.fc-km{font-size:11px;color:var(--txt3);}
.fc-costo{font-size:12px;font-weight:600;color:var(--vd);}
.pag{display:flex;gap:6px;justify-content:center;padding:12px;flex-wrap:wrap;}
.pbtn{padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:white;font-size:13px;cursor:pointer;}
.pbtn.active{background:var(--v);color:white;border-color:var(--v);}

/* PREVENTIVO MOBILE */
.prev-body{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;}
.mp-alert{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;margin-bottom:8px;font-size:13px;font-weight:500;}
.mp-alert.crit{background:var(--rl);border:1px solid #f7c1c1;color:#a32d2d;}
.mp-alert.warn{background:var(--al);border:1px solid #f0c060;color:#854f0b;}
.mp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;}
.mp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mp-placa{font-size:15px;font-weight:700;}
.mp-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f9fafb;font-size:13px;}
.mp-row:last-of-type{border:none;}
.mp-label{color:var(--txt2);}
.mp-val{font-weight:600;color:var(--txt);}

/* DOTS */
.dots{display:inline-flex;gap:4px;}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--v);animation:d 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes d{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* UNIT CHIP en chat header */
.unit-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;background:var(--vl);
  border-radius:20px;font-size:13px;font-weight:600;color:var(--vd);
}
.unit-chip-all{background:#f3f4f6;color:var(--txt2);}

/* EMPTY STATE */
.empty{padding:40px 20px;text-align:center;color:var(--txt3);}
.empty svg{width:48px;height:48px;fill:var(--border);margin-bottom:12px;}
.empty p{font-size:14px;}

/* PREDICCIÓN */
.pred-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.pred-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pred-placa{font-size:15px;font-weight:700;}
.pred-sistema{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3);margin-bottom:6px;}
.pred-bar-wrap{height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden;margin-bottom:6px;}
.pred-bar{height:8px;border-radius:4px;transition:width .6s ease;}
.pred-bar.ok{background:#22c55e;}
.pred-bar.warn{background:var(--a);}
.pred-bar.crit{background:var(--r);}
.pred-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--txt2);}
.pred-km-rest{font-weight:700;font-size:13px;}
.pred-km-rest.ok{color:#16a34a;}
.pred-km-rest.warn{color:#854f0b;}
.pred-km-rest.crit{color:#a32d2d;}
.pred-section{padding:8px 12px 4px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;}

/* NOTIF BADGE */
.notif-badge{
  position:absolute;top:-4px;right:-4px;
  width:18px;height:18px;border-radius:50%;
  background:var(--r);color:white;
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}
.bn-item{position:relative;}

/* NOTIF PANEL */
.notif-panel{
  position:fixed;top:56px;right:0;left:0;
  background:var(--card);border-bottom:1px solid var(--border);
  z-index:40;transform:translateY(-100%);
  transition:transform .25s cubic-bezier(.32,.72,0,1);
  max-height:220px;overflow-y:auto;
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.notif-panel.open{transform:translateY(0);}
.notif-head{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.notif-item{padding:9px 14px;border-bottom:1px solid #fafafa;display:flex;gap:10px;align-items:center;}
.notif-ico{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.notif-ico.crit{background:var(--rl);}
.notif-ico.warn{background:var(--al);}
.notif-ico.info{background:var(--vl);}
.notif-txt{flex:1;}
.notif-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:1px;}
.notif-sub{font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px;}
.notif-empty{padding:20px;text-align:center;color:var(--txt3);font-size:13px;}

/* ── MÓDULO PAGOS ── */
.pag-tabs{display:flex;gap:5px;overflow-x:auto;padding:10px 14px 0;scrollbar-width:none;flex-shrink:0;}
.pag-tabs::-webkit-scrollbar{display:none;}
.pag-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:600;background:white;color:var(--txt2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.pag-tab.active{background:var(--v);border-color:var(--v);color:white;}
.pag-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pag-stat-row{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;scrollbar-width:none;}
.pag-stat-row::-webkit-scrollbar{display:none;}
.pag-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;flex-shrink:0;min-width:106px;}
.pag-stat-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.pag-stat-val{font-size:18px;font-weight:700;color:var(--txt);}
.pag-stat-val.danger{color:var(--r);}
.pag-stat-val.warn{color:var(--a);}
.pag-stat-val.success{color:var(--v);}
.fac-card{margin:6px 12px;background:var(--card);border-radius:14px;padding:13px;border:1px solid var(--border);}
.fac-card.fac-venc{border-color:#f1948a;}
.fac-card.fac-pv{border-color:#f9e79f;}
.fac-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.fac-prov-name{font-size:15px;font-weight:700;color:var(--txt);}
.fac-num{font-size:11px;color:var(--txt3);}
.fac-desc{font-size:13px;color:var(--txt2);margin-bottom:7px;line-height:1.4;}
.fac-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
.fac-monto{font-size:15px;font-weight:700;}
.fac-saldo{font-size:11px;color:var(--r);font-weight:600;}
.fac-btns{display:flex;gap:5px;margin-top:8px;}
.fac-btn{padding:5px 11px;border-radius:9px;border:1px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt);}
.fac-btn.ok{color:var(--vd);border-color:var(--v);}
.fac-btn.del{color:var(--r);border-color:#f1948a;}
.prov-card{margin:6px 12px;background:var(--card);border-radius:14px;padding:13px;border:1px solid var(--border);}
.prov-inits{width:38px;height:38px;border-radius:50%;background:var(--vl);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--vd);flex-shrink:0;}
.prov-stats-g{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0;}
.prov-st{background:#f9fafb;border-radius:8px;padding:7px;text-align:center;}
.prov-st-lbl{font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;}
.prov-st-val{font-size:15px;font-weight:700;color:var(--txt);}
.prov-st-val.danger{color:var(--r);}
.pag-alert{background:var(--rl);border:1px solid #f1948a;padding:10px 14px;margin:0 12px 6px;border-radius:10px;font-size:12px;color:#7b241c;font-weight:600;}
.pag-warn{background:var(--al);border:1px solid #f0c060;padding:10px 14px;margin:0 12px 6px;border-radius:10px;font-size:12px;color:#7d6608;font-weight:600;}
.pag-section-lbl{padding:10px 16px 4px;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;}
.pag-empty{padding:40px 20px;text-align:center;color:var(--txt3);font-size:13px;}
.pag-venc-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--r);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
/* MODAL PAGOS */
.pag-modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.pag-modal-ov.open{display:flex;}
.pag-modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:1.25rem 1.25rem calc(1.25rem + var(--safe-bottom));}
.pag-modal h3{font-size:16px;font-weight:700;margin-bottom:1rem;}
.pm-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.pm-row.full{grid-template-columns:1fr;}
.pm-lbl{font-size:11px;color:var(--txt2);margin-bottom:3px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.pm-row input,.pm-row select,.pm-row textarea{width:100%;font-size:14px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:white;color:var(--txt);outline:none;font-family:var(--f);}
.pm-row input:focus,.pm-row select:focus{border-color:var(--v);}
.pm-row textarea{resize:vertical;min-height:55px;}
.pm-footer{display:flex;gap:8px;margin-top:1rem;}
.pm-cancel{flex:1;padding:12px;font-size:14px;border:1.5px solid var(--border);border-radius:12px;background:white;color:var(--txt2);cursor:pointer;font-weight:600;}

</div>

// ── DRAWER ────────────────────────────────────────────────────
function buildDrawer(){
  const allF=[...HIST.fallas,...liveDB.fallas];
  const body=document.getElementById('drawerBody');
  body.innerHTML='';
  const hSel=document.getElementById('hUnidad');
  hSel.innerHTML='<option value="">Todas las unidades</option>';

  const mkSec=(lbl)=>{
    const d=document.createElement('div'); d.className='drawer-section';
    d.textContent=lbl; body.appendChild(d);
  };
  const mkItem=(p,isAll)=>{
    const cnt=allF.filter(f=>(f.placa||f.unidad||'')===p).length;
    const div=document.createElement('div');
    div.className='drawer-item'+(p===chatUnit?' active':'');
    div.innerHTML=`<div class="di-left"><div class="di-dot"></div><div class="di-name">${p}</div></div><span class="di-badge">${cnt} registros</span>`;
    div.onclick=()=>{ chatUnit=p; setUnitHeader(p,cnt); closeDrawer(); buildDrawer(); };
    body.appendChild(div);
    if(!isAll){ const o=document.createElement('option'); o.value=p; o.textContent=p; hSel.appendChild(o); }
  };

  // Opción "todas"
  const all=document.createElement('div'); all.className='drawer-item'+(chatUnit===''?' active':'');
  all.innerHTML=`<div class="di-left"><div class="di-dot"></div><div class="di-name">Toda la flota</div></div><span class="di-badge">${allF.length} registros</span>`;
  all.onclick=()=>{ chatUnit=''; setUnitHeader('',''); closeDrawer(); buildDrawer(); };
  body.appendChild(all);

  mkSec('Tractos'); TRACTOS.forEach(p=>mkItem(p));
  mkSec('Tolvas');  TOLVAS.forEach(p=>mkItem(p));
}

function setUnitHeader(p,cnt){

}

function fmt(s){
  return s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
}

function addMsg(type,html,extras){
  const wrap=document.createElement('div'); wrap.className='msg '+type;
  const lbl=document.createElement('div'); lbl.className='msg-label '+type;
  lbl.textContent=type==='sal'?'Salvador':'Tú'; wrap.appendChild(lbl);
  const bub=document.createElement('div'); bub.className='msg-bubble';
  bub.innerHTML=fmt(html); wrap.appendChild(bub);
  if(extras?.photos?.length){
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;';
    extras.photos.forEach(u=>{const img=document.createElement('img');img.className='photo-thumb';img.src=u;row.appendChild(img);});

  const msgs=document.getElementById('chatMsgs');

}

// ── CONFIRM CARD ──────────────────────────────────────────────
function buildCC(data){
  const campos=[
    ['Unidad',data.placa],['Fecha',data.fecha],
    ['KM',data.km?data.km+' km':null],
    ['Descripción',data.descripcion],['Diagnóstico',data.diagnostico],
    ['Acción correctiva',data.accionCorrectiva],
    ['Gravedad',data.gravedad],['Estado',data.estadoFalla],
    ['Costo',data.costo?'S/. '+data.costo:null],
    ['Técnico',data.tecnico],
  ];
  const card=document.createElement('div'); card.className='confirm-card';
  card.innerHTML='<div class="confirm-title">📋 Confirma antes de guardar</div>';
  campos.forEach(([l,v])=>{
    if(!v) return;
    const r=document.createElement('div'); r.className='cf';
    r.innerHTML=`<span class="cfl">${l}</span><span class="cfv">${String(v).replace(/</g,'&lt;')}</span>`;
    card.appendChild(r);
  });
  const acts=document.createElement('div'); acts.className='confirm-actions';
  const ok=document.createElement('button'); ok.className='cbtn cbtn-ok'; ok.textContent='✓ Guardar en Firebase';
  const no=document.createElement('button'); no.className='cbtn cbtn-no'; no.textContent='✕ Corregir';
  ok.onclick=()=>{ saveToFB(data); card.remove(); };
  no.onclick=()=>{ card.remove(); addMsg('sal','¿Qué datos quieres corregir?'); pendingFalla=null; };
  acts.appendChild(ok); acts.appendChild(no); card.appendChild(acts);
  return card;
}

async function saveToFB(data){
  try{
    const ref=await addDoc(collection(fsdb,'fallas'),{
      placa:data.placa||'',fecha:data.fecha||new Date().toISOString().slice(0,10),
      km:Number(data.km)||0,descripcion:data.descripcion||'',
      diagnostico:data.diagnostico||'',accionCorrectiva:data.accionCorrectiva||'',
      gravedad:data.gravedad||'',estadoFalla:data.estadoFalla||'ABIERTO',
      estado:data.estado||'OPERATIVO',costo:Number(data.costo)||0,
      tecnico:data.tecnico||'',fuente:'Salvador-voz',timestamp:serverTimestamp(),
    });
    liveDB.fallas.unshift({fbId:ref.id,...data});
    addMsg('sal',`✅ **Guardado en Firebase**\n\n**${data.placa}** registrado correctamente. ¿Algo más?`);
    buildDrawer(); renderHist(); pendingFalla=null;
  }catch(e){
    addMsg('sal',`❌ Error: ${e.message}`);
  }
}

// ── CONTEXTO IA ───────────────────────────────────────────────
function buildCtx(placa){
  const allF=[...HIST.fallas,...liveDB.fallas];
  // Si hay unidad activa, solo sus fallas. Si no, últimas 40
  const fallas=placa
    ? allF.filter(f=>(f.placa||f.unidad||'')===placa).slice(-50)
    : allF.filter(f=>f.desc||f.descripcion).slice(-40);
  const prev=HIST.prev.filter(p=>!placa||p.placa===placa);
  const tracto=HIST.tractos.find(t=>t.placa===placa);
  let ctx=`MISAGI S.A.C. — Asistente Salvador\n`;
  ctx+=`Flota: ${[...TRACTOS,...TOLVAS].join(',')}\n`;
  if(tracto) ctx+=`${placa}: ${tracto.marca||''}, ${tracto.km?.toLocaleString?.()}km, ${tracto.estado}\n`;
  if(prev.length){ ctx+='MP: '; ctx+=prev.slice(0,3).map(p=>`${p.placa} próx=${p.km_mp}km est=${p.estado}`).join(' | ')+'\n'; }
  ctx+=`\nHISTORIAL (${fallas.length} registros relevantes):\n`;
  fallas.forEach(f=>{
    const d=(f.desc||f.descripcion||'').substring(0,80);
    const di=(f.diag||f.diagnostico||'').substring(0,40);
    if(!d) return;
    ctx+=`[${f.fecha||'s/f'}|${f.placa||f.unidad||''}|${f.km||0}km] ${d}${di?' →'+di:''}\n`;
  });
  // Agregar contexto de pagos si hay datos
  if(typeof pagProveedores!=='undefined' && pagProveedores.length){
    ctx+='\nPAGOS A PROVEEDORES:\n';
    pagProveedores.forEach(p=>{
      const pf=pagFacturas.filter(f=>f.provId===p.id);
      const saldo=pf.reduce((a,f)=>a+Math.max(0,(f.monto||0)-(f.abonado||0)),0);
      const venc=pf.filter(f=>pagEstFac(f)==='Vencido').length;
      ctx+=`${p.nombre}: saldo S/${saldo.toFixed(2)}, ${pf.length} facturas, ${venc} vencidas (tipo:${p.tipoDefecto||'contado'})\n`;
    });
    const totalVenc=pagFacturas.filter(f=>pagEstFac(f)==='Vencido');
    if(totalVenc.length){
      ctx+='FACTURAS VENCIDAS: ';
      ctx+=totalVenc.slice(0,5).map(f=>{const p=pagGetProv(f.provId);return`${p.nombre||'?'} S/${(f.monto||0).toFixed(0)} (${f.desc?.substring(0,30)||''}...)`;}).join(' | ')+'\n';
    }
  }
  return ctx;
}

function limpiarParaVoz(texto){
  let t = texto;

  // Quitar HTML
  t = t.replace(/<br\s*\/?>/gi, '. ');
  t = t.replace(/<[^>]+>/g, ' ');

  // Registro de falla — no leer el JSON
  t = t.replace(/REGISTRO_FALLA:\{[^}]*\}/gs, 'El registro está listo para que lo confirmes.');

  // Markdown → texto plano conversacional
  t = t.replace(/\*\*(.*?)\*\*/g, '$1');
  t = t.replace(/\*(.*?)\*/g, '$1');
  t = t.replace(/#{1,3}\s*/g, '');
  t = t.replace(/`([^`]+)`/g, '$1');

  // Listas con guión o asterisco → frases separadas por punto
  t = t.replace(/^\s*[-*•]\s+/gm, '. ');
  // Listas numeradas → quitar número
  t = t.replace(/^\s*\d+\.\s+/gm, '. ');

  // Tablas con pipe → ignorar
  t = t.replace(/\|.*?\|/g, '');

  // Emojis comunes → equivalente hablado o nada
  t = t.replace(/✅/g, '').replace(/❌/g, 'Error.').replace(/⚠️/g, 'Atención.').replace(/🔴/g, '').replace(/🟡/g, '').replace(/🔧/g, '').replace(/👋/g,'');
  t = t.replace(/[\u{1F300}-\u{1FFFF}]/gu, '');

  // Unidades y abreviaciones → forma hablada
  t = t.replace(/S\/\s*/g, 'Soles ');
  t = t.replace(/\bkm\b/gi, ' kilómetros');
  t = t.replace(/\bKM\b/g, ' kilómetros');
  t = t.replace(/\bmp\b/gi, 'mantenimiento preventivo');
  t = t.replace(/\bMP\b/g, 'mantenimiento preventivo');
  t = t.replace(/\bGNL\b/g, 'gas natural licuado');
  t = t.replace(/\bAdBlue\b/gi, 'Ad Blue');

  // Placas de vehículos → deletrear con espacios para que suene natural
  t = t.replace(/\b([A-Z]{2,3})-?(\d{3})\b/g, (m,l,n)=> l.split('').join(' ')+' '+n.split('').join(' '));

  // Números grandes → sin puntos de miles para que no los lea raro
  t = t.replace(/(\d{1,3})\.(?=\d{3})/g, '$1');

  // Múltiples puntos seguidos → uno solo
  t = t.replace(/\.{2,}/g, '.');
  // Múltiples espacios y saltos
  t = t.replace(/\n{2,}/g, '. ');
  t = t.replace(/\n/g, '. ');
  t = t.replace(/\s{2,}/g, ' ');

  // Quitar puntos al inicio
  t = t.replace(/^\.+\s*/g, '');

  // Asegurar que termina con punto
  t = t.trim();
  if(t && !'.!?'.includes(t.slice(-1))) t += '.';

  return t;
}

async function salvadorHabla(texto){
  if(!vozActiva) return;
  if(vozAudio){ vozAudio.pause(); vozAudio=null; vozSpeaking=false; }

  const apiKey = VOZ_CFG.apiKey;
  const voiceId = VOZ_CFG.voiceId;
  const btn = document.getElementById('speakBtn');

  const limpio = limpiarParaVoz(texto);
  if(!limpio || limpio.length < 3) return;

  // Sin API key → fallback inmediato
  if(!apiKey){
    console.log('[Salvador Voz] Sin API key, usando fallback del navegador');
    salvadorHablaFallback(texto);
    return;
  }

  btn.classList.add('speaking');
  console.log('[Salvador Voz] Llamando ElevenLabs, voiceId:', voiceId, '| chars:', limpio.length);

  try{
    const res = await fetch(
      'https://api.elevenlabs.io/v1/text-to-speech/' + voiceId,
      {
        method: 'POST',
        headers: {
          'xi-api-key': apiKey,
          'Content-Type': 'application/json',
          'Accept': 'audio/mpeg'
        },
        body: JSON.stringify({
          text: limpio,
          model_id: 'eleven_multilingual_v2',
          voice_settings: {
            stability: 0.28,
            similarity_boost: 0.80,
            style: 0.50,
            use_speaker_boost: true
          }
        })
      }
    );

    console.log('[Salvador Voz] Respuesta HTTP:', res.status, res.statusText);

    if(!res.ok){
      let errMsg = '';
      try{ const j=await res.json(); errMsg=j.detail?.message||JSON.stringify(j); }catch(e){}
      console.warn('[Salvador Voz] Error ElevenLabs:', res.status, errMsg);
      btn.classList.remove('speaking');
      // Mostrar error visible si es de autenticación
      if(res.status===401||res.status===403){
        mostrarToast('API key inválida. Abre Configuración de voz y verifica.');
      } else if(res.status===422){
        mostrarToast('Voice ID incorrecto. Verifica en Configuración de voz.');
      }
      salvadorHablaFallback(texto);
      return;
    }

    const blob = await res.blob();
    console.log('[Salvador Voz] Audio recibido, tamaño:', blob.size, 'bytes');

    if(blob.size < 100){
      console.warn('[Salvador Voz] Audio vacío, usando fallback');
      btn.classList.remove('speaking');
      salvadorHablaFallback(texto);
      return;
    }

    const url = URL.createObjectURL(blob);
    vozAudio = new Audio(url);
    vozAudio.oncanplaythrough = () => {
      vozAudio.play().catch(e=>{
        console.warn('[Salvador Voz] Error play:', e);
        btn.classList.remove('speaking');
      });
    };
    vozAudio.onended = () => {
      vozSpeaking = false;
      btn.classList.remove('speaking');
      URL.revokeObjectURL(url);
      vozAudio = null;
    };
    vozAudio.onerror = (e) => {
      console.warn('[Salvador Voz] Error audio:', e);
      vozSpeaking = false;
      btn.classList.remove('speaking');
      salvadorHablaFallback(texto);
    };
    vozSpeaking = true;

  } catch(e){
    console.warn('[Salvador Voz] Fetch error:', e.message);
    btn.classList.remove('speaking');
    salvadorHablaFallback(texto);
  }
}

// Fallback — voz del navegador si no hay API key
function salvadorHablaFallback(texto){
  const synth = window.speechSynthesis;
  if(!synth) return;
  synth.cancel();
  const limpio = limpiarParaVoz(texto);
  if(!limpio) return;
  const utter = new SpeechSynthesisUtterance(limpio);
  utter.lang='es-PE'; utter.rate=0.92; utter.pitch=0.9; utter.volume=1.0;
  const voces = synth.getVoices();
  const v = voces.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('male'))
    || voces.find(v=>v.lang.startsWith('es'));
  if(v) utter.voice=v;
  const btn=document.getElementById('speakBtn');
  utter.onend=()=>{ vozSpeaking=false; btn.classList.remove('speaking'); };
  synth.speak(utter);
  vozSpeaking=true; btn.classList.add('speaking');
}

function renderPrev(){
  const KM=310;
  const byP={};
  HIST.prev.forEach(p=>{if(!byP[p.placa]||(p.km_actual>(byP[p.placa].km_actual||0)))byP[p.placa]=p;});
  const rows=Object.values(byP).filter(p=>PLACAS_OK.has(p.placa))
    .sort((a,b)=>((a.km_mp||0)-(a.km_actual||0))-((b.km_mp||0)-(b.km_actual||0)));

  const body=document.getElementById('prevBody'); body.innerHTML='';

  rows.forEach(p=>{
    const rest=(p.km_mp||0)-(p.km_actual||0);
    const dias=Math.round(rest/KM);
    let cls='bv',txt='OK',alertCls='';

    if(rest<0){cls='br';txt='VENCIDO';
      const a=document.createElement('div'); a.className='mp-alert crit';
      a.innerHTML=`🔴 <strong>${p.placa}</strong>: MP vencido hace ~${Math.abs(dias)} días`;
      body.appendChild(a);
    } else if(rest<5000){cls='ba';txt='PRÓXIMO';
      const a=document.createElement('div'); a.className='mp-alert warn';
      a.innerHTML=`🟡 <strong>${p.placa}</strong>: ${rest.toLocaleString()} km restantes (~${dias} días)`;
      body.appendChild(a);
    }

    const card=document.createElement('div'); card.className='mp-card';
    card.innerHTML=`
      <div class="mp-top">
        <span class="mp-placa">${p.placa}</span>
        <span class="badge ${cls}">${txt}</span>
      </div>
      <div class="mp-row"><span class="mp-label">KM actual</span><span class="mp-val">${(p.km_actual||0).toLocaleString()} km</span></div>
      <div class="mp-row"><span class="mp-label">Próximo MP</span><span class="mp-val">${(p.km_mp||0).toLocaleString()} km</span></div>
      <div class="mp-row"><span class="mp-label">KM restantes</span><span class="mp-val">${rest>0?rest.toLocaleString()+' km':'VENCIDO'}</span></div>
      <div class="mp-row"><span class="mp-label">Días estimados</span><span class="mp-val">${dias>0?dias+' días':'—'}</span></div>`;
    body.appendChild(card);
  });
}

function renderPred(){
  const body=document.getElementById('predBody');
  body.innerHTML='';

  // Obtener km actuales de tractos
  const kmActual={};
  HIST.tractos.forEach(t=>{ if(t.km) kmActual[t.placa]=t.km; });
  // Actualizar con datos de preventivo (más reciente)
  HIST.prev.forEach(p=>{ if(p.km_actual) kmActual[p.placa]=p.km_actual; });

  const alertas=[];
  const placas=Object.keys(PATRONES).sort();

  placas.forEach(placa=>{
    const cats=PATRONES[placa];
    if(!cats||!Object.keys(cats).length) return;
    const kmHoy=kmActual[placa]||0;
    const items=[];

    Object.entries(cats).forEach(([cat,p])=>{
      if(!p.intervalo_avg_km||p.intervalo_avg_km<=0) return;
      const kmProximo=p.ultimo_km+p.intervalo_avg_km;
      const kmRestantes=kmProximo-kmHoy;
      const pct=Math.max(0,Math.min(100,Math.round((1-(kmRestantes/p.intervalo_avg_km))*100)));
      let estado='ok';
      if(kmRestantes<=0) estado='crit';
      else if(kmRestantes<3000) estado='warn';

      if(estado==='crit'||estado==='warn'){
        alertas.push({placa,cat,kmRestantes,estado,label:SISTEMA_LABELS[cat]||cat});
      }
      items.push({cat,kmRestantes,kmProximo,pct,estado,label:SISTEMA_LABELS[cat]||cat,count:p.count});
    });

    if(!items.length) return;
    items.sort((a,b)=>a.kmRestantes-b.kmRestantes);

    const sec=document.createElement('div'); sec.className='pred-section';
    sec.textContent=placa+' · '+( kmHoy?kmHoy.toLocaleString()+' km actuales':'km no registrado');
    body.appendChild(sec);

    items.forEach(it=>{
      const card=document.createElement('div'); card.className='pred-card';
      const kmTxt=it.kmRestantes<=0
        ?'VENCIDO'
        :(it.kmRestantes.toLocaleString()+' km restantes');
      card.innerHTML=`
        <div class="pred-sistema">${it.label} <span style="font-weight:400;color:var(--txt3)">(${it.count} eventos históricos)</span></div>
        <div class="pred-bar-wrap"><div class="pred-bar ${it.estado}" style="width:${it.pct}%"></div></div>
        <div class="pred-meta">
          <span>Próximo riesgo: ${it.kmProximo.toLocaleString()} km</span>
          <span class="pred-km-rest ${it.estado}">${kmTxt}</span>
        </div>`;
      body.appendChild(card);
    });
  });

  if(!placas.length){
    body.innerHTML='<div class="empty"><p>No hay suficientes datos para predicción</p></div>';
  }

  // Actualizar notificaciones
  updateNotifs(alertas);
}

// ── NOTIFICACIONES ────────────────────────────────────────────
let notifAlertas=[];

function updateNotifs(alertas){
  notifAlertas=alertas;
  const badge=document.getElementById('notifCount');
  const list=document.getElementById('notifList');

  // Agregar alertas de MP
  const mpAlertas=[];
  const KM=310;
  const byP={};
  HIST.prev.forEach(p=>{if(!byP[p.placa]||(p.km_actual>(byP[p.placa].km_actual||0)))byP[p.placa]=p;});
  Object.values(byP).forEach(p=>{
    const rest=(p.km_mp||0)-(p.km_actual||0);
    if(rest<0) mpAlertas.push({placa:p.placa,msg:`MP vencido hace ~${Math.abs(Math.round(rest/KM))} días`,tipo:'crit'});
    else if(rest<5000) mpAlertas.push({placa:p.placa,msg:`${rest.toLocaleString()} km para próximo MP (~${Math.round(rest/KM)} días)`,tipo:'warn'});
  });

  // Fallas abiertas Firebase
  const abiertas=liveDB.fallas.filter(f=>f.estadoFalla==='ABIERTO'||f.estado==='Pendiente');

  const total=alertas.length+mpAlertas.length+abiertas.length;
  if(total>0){
    badge.style.display='flex'; badge.textContent=total>9?'9+':total;
  } else {
    badge.style.display='none';
  }

  if(!total){
    list.innerHTML='<div class="notif-empty">Sin alertas pendientes ✓</div>'; return;
  }

  list.innerHTML='';

  // MP vencidos/próximos
  mpAlertas.forEach(a=>{
    const div=document.createElement('div'); div.className='notif-item';
    div.innerHTML=`<div class="notif-ico ${a.tipo}">${a.tipo==='crit'?'🔴':'🟡'}</div>
      <div class="notif-txt"><div class="notif-title">${a.placa} — Preventivo</div>
      <div class="notif-sub">${a.msg}</div></div>`;
    list.appendChild(div);
  });

  // Predicciones críticas
  alertas.forEach(a=>{
    const div=document.createElement('div'); div.className='notif-item';
    const msg=a.kmRestantes<=0?`${a.label} vencido — atención inmediata`:`${a.label}: ${a.kmRestantes.toLocaleString()} km para próximo evento`;
    div.innerHTML=`<div class="notif-ico ${a.estado}">${a.estado==='crit'?'⚠️':'🔔'}</div>
      <div class="notif-txt"><div class="notif-title">${a.placa} — ${a.label}</div>
      <div class="notif-sub">${msg}</div></div>`;
    list.appendChild(div);
  });

  // Fallas abiertas
  abiertas.slice(0,5).forEach(f=>{
    const div=document.createElement('div'); div.className='notif-item';
    div.innerHTML=`<div class="notif-ico info">🔧</div>
      <div class="notif-txt"><div class="notif-title">${f.placa||'—'} — Falla abierta</div>
      <div class="notif-sub">${(f.descripcion||f.desc||'Sin descripción').substring(0,80)}</div></div>`;
    list.appendChild(div);
  });
}

<script>
// ══════════════════════════════════════════════════════
//  MÓDULO PAGOS A PROVEEDORES — Salvador IA
//  Usa misma instancia Firebase (fsdb) ya inicializada
// ══════════════════════════════════════════════════════

// Esperar a que el módulo principal cargue fsdb
function waitFsdb(cb,n=0){if(window.fsdb_pagos){cb();}else if(n<30){setTimeout(()=>waitFsdb(cb,n+1),200);}else{console.warn('fsdb no disponible para pagos');}}

let pagProveedores=[];
let pagFacturas=[];
let pagCurrentTab='resumen';
let pagFiltProv='';
let pagFiltEst='';

// ── Utils ──
function pagToday(){return new Date().toISOString().split('T')[0];}
function pagFmt(n){return(n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pagDiasDesde(f){if(!f)return 0;const d=new Date(f+'T00:00:00');const h=new Date();h.setHours(0,0,0,0);return Math.floor((h-d)/86400000);}
function pagFechaVenc(f){
  if(!f.fecha)return null;
  if(f.tipo==='contado')return f.fecha;
  const d=new Date(f.fecha+'T00:00:00');
  d.setDate(d.getDate()+(parseInt(f.diasCredito)||30));
  return d.toISOString().split('T')[0];
}
function pagEstFac(f){
  if(f.estado==='Pagado')return'Pagado';
  const ab=f.abonado||0;
  if(ab>0&&ab<(f.monto||0))return'Parcial';
  const venc=pagFechaVenc(f);
  if(!venc)return'Pendiente';
  const dias=pagDiasDesde(venc);
  if(f.tipo==='contado'){if(dias>0)return'Vencido';}
  else{if(dias>=3)return'Vencido';if(dias>0)return'Por vencer';}
  return'Pendiente';
}
function pagBadge(e){return{Pagado:'bv',Vencido:'br','Por vencer':'ba',Pendiente:'bg',Parcial:'ba'}[e]||'bg';}
function pagSaldo(f){return Math.max(0,(f.monto||0)-(f.abonado||0));}
function pagInits(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function pagGetProv(id){return pagProveedores.find(p=>p.id===id)||{};}

function pagUpdateBadge(){
  const n=pagFacturas.filter(f=>pagEstFac(f)==='Vencido').length;
  const b=document.getElementById('pag-venc-badge');
  if(!b)return;
  if(n>0){b.textContent=n;b.style.display='flex';}else b.style.display='none';
}

// ── Firebase listeners ──
function pagInitFirebase(){
  const {collection,onSnapshot,query,orderBy}=window._fbPagos;
  const db=window.fsdb_pagos;
  onSnapshot(collection(db,'proveedores_mant'),snap=>{
    pagProveedores=snap.docs.map(d=>({id:d.id,...d.data()}));
    pagUpdateBadge();
    if(pagCurrentTab)renderPagView();
  });
  onSnapshot(query(collection(db,'pagos_proveedores'),orderBy('fecha','desc')),snap=>{
    pagFacturas=snap.docs.map(d=>({id:d.id,...d.data()}));
    pagUpdateBadge();
    if(pagCurrentTab)renderPagView();
  });
}

window.setPagTab=function(t,el){
  pagCurrentTab=t;
  document.querySelectorAll('.pag-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderPagView();
};

window.renderPagView=function(){
  if(pagCurrentTab==='resumen')pagRenderResumen();
  else if(pagCurrentTab==='facturas')pagRenderFacturas();
  else if(pagCurrentTab==='proveedores')pagRenderProveedores();
  else if(pagCurrentTab==='alertas')pagRenderAlertas();
};

function pagRenderResumen(){
  const el=document.getElementById('pagBody');
  const total=pagFacturas.reduce((a,f)=>a+(f.monto||0),0);
  const pagado=pagFacturas.reduce((a,f)=>a+(f.abonado||0),0);
  const pend=total-pagado;
  const venc=pagFacturas.filter(f=>pagEstFac(f)==='Vencido').length;
  const pv=pagFacturas.filter(f=>pagEstFac(f)==='Por vencer').length;

  let strips='';
  if(venc>0)strips+=`<div class="pag-alert">! ${venc} factura${venc!==1?'s':''} vencida${venc!==1?'s':''}  — pago urgente</div>`;
  if(pv>0)strips+=`<div class="pag-warn">⏰ ${pv} próxima${pv!==1?'s':''} a vencer</div>`;

  let provHtml=pagProveedores.length?pagProveedores.map(p=>{
    const pf=pagFacturas.filter(f=>f.provId===p.id);
    const saldo=pf.reduce((a,f)=>a+pagSaldo(f),0);
    const pvenc=pf.filter(f=>pagEstFac(f)==='Vencido').length;
    return`<div class="fac-card">
      <div class="fac-top">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="prov-inits">${pagInits(p.nombre)}</div>
          <div><div class="fac-prov-name">${p.nombre}</div>
          <div class="fac-num">${pf.length} factura${pf.length!==1?'s':''} · <span class="badge ${p.tipoDefecto==='credito'?'ba':'bg'}">${p.tipoDefecto==='credito'?`Cred. ${p.diasCredito}d`:'Contado'}</span></div></div>
        </div>
        <div style="text-align:right">
          <div class="fac-monto" style="color:${saldo>0?'var(--r)':'var(--v)'}"}>S/ ${pagFmt(saldo)}</div>
          <div style="font-size:11px;color:${pvenc>0?'var(--r)':'var(--txt3)'}">${pvenc>0?`${pvenc} vencida${pvenc!==1?'s':''}`:'Al día'}</div>
        </div>
      </div>
    </div>`;
  }).join(''):'<div class="pag-empty">Sin proveedores aún. Toca "+ Proveedor".</div>';

  el.innerHTML=`
    ${strips}
    <div class="pag-stat-row">
      <div class="pag-stat"><div class="pag-stat-lbl">Total</div><div class="pag-stat-val">S/ ${pagFmt(total)}</div></div>
      <div class="pag-stat"><div class="pag-stat-lbl">Pagado</div><div class="pag-stat-val success">S/ ${pagFmt(pagado)}</div></div>
      <div class="pag-stat"><div class="pag-stat-lbl">Saldo</div><div class="pag-stat-val danger">S/ ${pagFmt(pend)}</div></div>
      <div class="pag-stat"><div class="pag-stat-lbl">Vencidas</div><div class="pag-stat-val danger">${venc}</div></div>
      <div class="pag-stat"><div class="pag-stat-lbl">Proveed.</div><div class="pag-stat-val">${pagProveedores.length}</div></div>
    </div>
    <div class="pag-section-lbl">Por proveedor</div>${provHtml}`;
}

function pagRenderFacturas(){
  const el=document.getElementById('pagBody');
  let rows=pagFacturas.filter(f=>{
    if(pagFiltProv&&f.provId!==pagFiltProv)return false;
    if(pagFiltEst&&pagEstFac(f)!==pagFiltEst)return false;
    return true;
  });
  const provOpts=pagProveedores.map(p=>`<option value="${p.id}" ${pagFiltProv===p.id?'selected':''}>${p.nombre}</option>`).join('');
  let html=`<div style="padding:10px 12px 0;display:flex;gap:7px;flex-wrap:wrap">
    <select style="font-size:12px;padding:5px 8px;border:1.5px solid var(--border);border-radius:9px;background:white;color:var(--txt);flex:1" onchange="pagFiltProv=this.value;renderPagView()">
      <option value="">Todos los proveedores</option>${provOpts}</select>
    <select style="font-size:12px;padding:5px 8px;border:1.5px solid var(--border);border-radius:9px;background:white;color:var(--txt);flex:1" onchange="pagFiltEst=this.value;renderPagView()">
      <option value="">Todos los estados</option>
      <option>Pendiente</option><option>Parcial</option><option>Por vencer</option><option>Vencido</option><option>Pagado</option>
    </select></div>`;
  if(!rows.length){el.innerHTML=html+'<div class="pag-empty">Sin facturas para los filtros.</div>';return;}
  html+=rows.map(f=>{
    const p=pagGetProv(f.provId);
    const est=pagEstFac(f);
    const saldo=pagSaldo(f);
    const venc=pagFechaVenc(f);
    const dias=venc?pagDiasDesde(venc):0;
    const cls=est==='Vencido'?'fac-venc':est==='Por vencer'?'fac-pv':'';
    return`<div class="fac-card ${cls}">
      <div class="fac-top">
        <div><div class="fac-prov-name">${p.nombre||'—'}</div>
        <div class="fac-num">${f.numero||'sin N°'} · ${f.fecha||'—'}</div></div>
        <div style="text-align:right">
          <div class="fac-monto">S/ ${pagFmt(f.monto)}</div>
          ${saldo>0?`<div class="fac-saldo">Saldo: S/ ${pagFmt(saldo)}</div>`:''}
        </div>
      </div>
      <div class="fac-desc">${f.desc||'—'}</div>
      <div class="fac-meta">
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span class="badge ${pagBadge(est)}">${est}</span>
          <span class="badge ${f.tipo==='credito'?'ba':'bg'}">${f.tipo==='credito'?`Cred. ${f.diasCredito}d`:'Contado'}</span>
          ${est==='Vencido'&&dias>0?`<span class="badge br">${dias}d atraso</span>`:''}
        </div>
      </div>
      <div class="fac-btns">
        <button class="fac-btn ok" onclick="pagAbonar('${f.id}')">Pagar</button>
        <button class="fac-btn" onclick="pagEditFac('${f.id}')">Editar</button>
        <button class="fac-btn del" onclick="pagDelFac('${f.id}')">Eliminar</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=html;
}

function pagRenderProveedores(){
  const el=document.getElementById('pagBody');
  if(!pagProveedores.length){el.innerHTML='<div class="pag-empty">Sin proveedores. Toca "+ Proveedor".</div>';return;}
  el.innerHTML=pagProveedores.map(p=>{
    const pf=pagFacturas.filter(f=>f.provId===p.id);
    const saldo=pf.reduce((a,f)=>a+pagSaldo(f),0);
    const pvenc=pf.filter(f=>pagEstFac(f)==='Vencido').length;
    const emails=(p.emails||[]).map(e=>`<span class="badge bg" style="font-size:10px">${e}</span>`).join(' ');
    return`<div class="prov-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="prov-inits">${pagInits(p.nombre)}</div>
        <div style="flex:1"><div style="font-size:15px;font-weight:700">${p.nombre}</div>
        <div style="font-size:12px;color:var(--txt2)">RUC: ${p.ruc||'—'} · ${p.telefono||'sin tel'}</div></div>
        <span class="badge ${p.tipoDefecto==='credito'?'ba':'bg'}">${p.tipoDefecto==='credito'?`Cred. ${p.diasCredito}d`:'Contado'}</span>
      </div>
      <div class="prov-stats-g">
        <div class="prov-st"><div class="prov-st-lbl">Facturas</div><div class="prov-st-val">${pf.length}</div></div>
        <div class="prov-st"><div class="prov-st-lbl">Saldo</div><div class="prov-st-val ${saldo>0?'danger':''}">S/ ${pagFmt(saldo)}</div></div>
        <div class="prov-st"><div class="prov-st-lbl">Vencidas</div><div class="prov-st-val ${pvenc>0?'danger':''}">${pvenc}</div></div>
      </div>
      ${p.banco?`<div style="font-size:12px;color:var(--txt2);margin-bottom:6px">Banco: <strong>${p.banco}</strong>${p.cuenta?` · Cta: ${p.cuenta}`:''}</div>`:''}
      ${p.emails&&p.emails.length?`<div style="margin-bottom:8px;display:flex;gap:4px;flex-wrap:wrap">${emails}</div>`:''}
      <div class="fac-btns">
        <button class="fac-btn ok" onclick="pagEditProv('${p.id}')">Editar</button>
        <button class="fac-btn del" onclick="pagDelProv('${p.id}')">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

function pagRenderAlertas(){
  const el=document.getElementById('pagBody');
  const crit=pagFacturas.filter(f=>pagEstFac(f)==='Vencido');
  const warn=pagFacturas.filter(f=>pagEstFac(f)==='Por vencer');
  if(!crit.length&&!warn.length){el.innerHTML='<div class="pag-empty" style="color:var(--v)">✓ Sin alertas. Todas las facturas al día.</div>';return;}
  let html='';
  if(crit.length){
    html+=`<div class="pag-section-lbl" style="color:var(--r)">Vencidas (${crit.length})</div>`;
    crit.forEach(f=>{
      const p=pagGetProv(f.provId);
      const dias=pagDiasDesde(pagFechaVenc(f));
      const saldo=pagSaldo(f);
      html+=`<div class="fac-card fac-venc">
        <div class="fac-top">
          <div><div class="fac-prov-name" style="color:var(--r)">${p.nombre||'—'} · ${f.numero||'sin N°'}</div>
          <div class="fac-num">${dias}d de atraso · ${f.tipo==='contado'?'Contado':`Cred. ${f.diasCredito}d`}</div></div>
          <div style="text-align:right"><div class="fac-monto" style="color:var(--r)">S/ ${pagFmt(saldo)}</div></div>
        </div>
        <div class="fac-desc">${f.desc||'—'}</div>
        <div class="fac-btns"><button class="fac-btn ok" onclick="pagAbonar('${f.id}')">Registrar pago</button></div>
      </div>`;
    });
  }
  if(warn.length){
    html+=`<div class="pag-section-lbl" style="color:var(--a)">Próximas a vencer</div>`;
    warn.forEach(f=>{
      const p=pagGetProv(f.provId);
      html+=`<div class="fac-card fac-pv">
        <div class="fac-top">
          <div><div class="fac-prov-name">${p.nombre||'—'} · ${f.numero||'sin N°'}</div></div>
          <div style="text-align:right"><div class="fac-monto" style="color:var(--a)">S/ ${pagFmt(pagSaldo(f))}</div></div>
        </div>
        <div class="fac-desc">${f.desc||'—'}</div>
        <div class="fac-btns"><button class="fac-btn ok" onclick="pagAbonar('${f.id}')">Registrar pago</button></div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

        </select></div></div>
      <div id="fcredw" style="display:${f.tipo==='credito'?'grid':'none'};grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label class="pm-lbl">Días crédito</label><input type="number" id="fdias" value="${f.diasCredito||30}" min="1" oninput="pagUpdVenc()"></div>
        <div><label class="pm-lbl">Vence el</label><input id="fvenc" readonly style="background:#f9fafb;color:var(--txt2)" value="—"></div>
      </div>
      <div class="pm-row"><div><label class="pm-lbl">Monto S/ *</label><input type="number" id="fmonto" value="${f.monto||''}" min="0" step="0.01"></div>
      <div><label class="pm-lbl">Abonado S/</label><input type="number" id="fabono" value="${f.abonado||0}" min="0" step="0.01"></div></div>
      <div class="pm-row full"><div><label class="pm-lbl">Descripción del servicio</label><textarea id="fdesc">${f.desc||''}</textarea></div></div>
      <div class="pm-row full"><div><label class="pm-lbl">Referencia doc. físico</label><input id="farch" value="${f.archivo||''}"></div></div>
      <div class="pm-row full"><div><label class="pm-lbl">Notas</label><input id="fnota" value="${f.notas||''}"></div></div>
      <div class="pm-footer">
        <button class="pm-cancel" onclick="pagCloseModal()">Cancelar</button>
        <button class="pm-save" onclick="pagSaveFac('${f.id||''}')">${f.id?'Guardar':'Registrar factura'}</button>
      </div>`;
    setTimeout(pagUpdVenc,30);
  } else if(type==='abono'){
    const f=data;const p=pagGetProv(f.provId);const saldo=pagSaldo(f);
    mi.innerHTML=`<h3>Registrar pago</h3>
      <div style="background:#f9fafb;border-radius:10px;padding:12px;margin-bottom:12px">
        <div style="font-weight:700;margin-bottom:2px">${p.nombre||'—'} · ${f.numero||'sin N°'}</div>
        <div style="font-size:13px;color:var(--txt2)">${f.desc||''}</div>
        <div style="margin-top:6px;font-size:14px">Saldo: <strong style="color:var(--r)">S/ ${pagFmt(saldo)}</strong></div>
      </div>
      <div class="pm-row"><div><label class="pm-lbl">Monto S/</label><input type="number" id="abm" value="${saldo.toFixed(2)}" min="0.01" step="0.01"></div>
      <div><label class="pm-lbl">Fecha pago</label><input type="date" id="abf" value="${pagToday()}"></div></div>
      <div class="pm-row full"><div><label class="pm-lbl">Referencia / N° operación</label><input id="abref" placeholder="N° transferencia, voucher..."></div></div>
      <div class="pm-footer">
        <button class="pm-cancel" onclick="pagCloseModal()">Cancelar</button>
        <button class="pm-save" onclick="pagConfAbono('${f.id}')">Confirmar pago</button>
      </div>`;
  }
  document.getElementById('pag-modal-ov').classList.add('open');
};
window.pagCloseModal=function(){document.getElementById('pag-modal-ov').classList.remove('open');};
window.pagTogFCred=function(){const t=document.getElementById('ftipo');const w=document.getElementById('fcredw');if(t&&w)w.style.display=t.value==='credito'?'grid':'none';};
window.pagUpdVenc=function(){
  const fd=document.getElementById('ffecha');const ft=document.getElementById('ftipo');
  const dd=document.getElementById('fdias');const fv=document.getElementById('fvenc');
  if(!fd||!ft||!fv)return;
  if(ft.value==='contado'){fv.value='Mismo día';return;}
  if(fd.value&&dd){const d=new Date(fd.value+'T00:00:00');d.setDate(d.getDate()+parseInt(dd.value||30));fv.value=d.toISOString().split('T')[0];}
};

// ── CRUD Firebase ──
window.pagSaveProv=async function(id){
  const {collection,doc,addDoc,updateDoc,serverTimestamp}=window._fbPagos;
  const nombre=(document.getElementById('ppn').value||'').trim();
  if(!nombre)return alert('El nombre es obligatorio.');
  const emails=(document.getElementById('ppemails').value||'').split(',').map(e=>e.trim()).filter(e=>e.includes('@'));
  const data={nombre,ruc:(document.getElementById('ppruc').value||'').trim(),
    telefono:(document.getElementById('pptel').value||'').trim(),banco:(document.getElementById('ppbanco').value||'').trim(),
    cuenta:(document.getElementById('ppcuenta').value||'').trim(),tipoDefecto:document.getElementById('pptipo').value,
    diasCredito:parseInt(document.getElementById('ppdias')?.value)||30,
    notas:(document.getElementById('ppnota').value||'').trim(),emails,updatedAt:serverTimestamp()};
  const db=window.fsdb_pagos;
  if(id){await updateDoc(doc(db,'proveedores_mant',id),data);}
  else{await addDoc(collection(db,'proveedores_mant'),{...data,createdAt:serverTimestamp()});}
  pagCloseModal();
};
window.pagEditProv=function(id){const p=pagProveedores.find(x=>x.id===id);if(p)pagOpenModal('prov',p);};
window.pagDelProv=async function(id){
  const {collection,doc,deleteDoc}=window._fbPagos;const db=window.fsdb_pagos;
  const pf=pagFacturas.filter(f=>f.provId===id);
  if(pf.length&&!confirm(`Este proveedor tiene ${pf.length} factura(s). ¿Eliminar?`))return;
  await deleteDoc(doc(db,'proveedores_mant',id));
  for(const f of pf)await deleteDoc(doc(db,'pagos_proveedores',f.id));
};
window.pagSaveFac=async function(id){
  const {collection,doc,addDoc,updateDoc,serverTimestamp}=window._fbPagos;const db=window.fsdb_pagos;
  const monto=parseFloat(document.getElementById('fmonto').value)||0;
  const abonado=Math.min(parseFloat(document.getElementById('fabono').value)||0,monto);
  let estado='Pendiente';
  if(abonado>=monto&&monto>0)estado='Pagado';else if(abonado>0)estado='Parcial';
  const data={provId:document.getElementById('fprov').value,numero:(document.getElementById('fnum').value||'').trim(),
    fecha:document.getElementById('ffecha').value,tipo:document.getElementById('ftipo').value,
    diasCredito:parseInt(document.getElementById('fdias')?.value)||30,
    monto,abonado,estado,desc:(document.getElementById('fdesc').value||'').trim(),
    archivo:(document.getElementById('farch').value||'').trim(),notas:(document.getElementById('fnota').value||'').trim(),
    updatedAt:serverTimestamp()};
  if(id){await updateDoc(doc(db,'pagos_proveedores',id),data);}
  else{await addDoc(collection(db,'pagos_proveedores'),{...data,createdAt:serverTimestamp()});}
  pagCloseModal();
};
window.pagEditFac=function(id){const f=pagFacturas.find(x=>x.id===id);if(f)pagOpenModal('factura',f);};
window.pagDelFac=async function(id){
  const {doc,deleteDoc}=window._fbPagos;const db=window.fsdb_pagos;
  if(confirm('¿Eliminar esta factura?'))await deleteDoc(doc(db,'pagos_proveedores',id));
};
window.pagAbonar=function(id){const f=pagFacturas.find(x=>x.id===id);if(f)pagOpenModal('abono',f);};
window.pagConfAbono=async function(id){
  const {doc,updateDoc,serverTimestamp}=window._fbPagos;const db=window.fsdb_pagos;
  const f=pagFacturas.find(x=>x.id===id);
  const monto=parseFloat(document.getElementById('abm').value)||0;
  if(!f||monto<=0)return;
  const newAb=Math.min((f.abonado||0)+monto,f.monto||0);
  const estado=newAb>=(f.monto||0)?'Pagado':'Parcial';
  await updateDoc(doc(db,'pagos_proveedores',id),{abonado:newAb,estado,updatedAt:serverTimestamp()});
  pagCloseModal();
};
</script>
</body>

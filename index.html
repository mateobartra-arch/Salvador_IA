<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salvador — MISAGI S.A.C.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#1D9E75;--vd:#0F6E56;--vl:#E1F5EE;
  --r:#E24B4A;--rl:#FCEBEB;--a:#EF9F27;--al:#FAEEDA;
  --bg:#f4f6f9;--card:#fff;--border:#e5e7eb;
  --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
  --f:'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--f);background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-ico{width:32px;height:32px;background:var(--v);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.nav-ico svg{width:17px;height:17px;fill:white;}
.nav-name{font-size:15px;font-weight:600;}
.nav-sub{font-size:11px;color:var(--txt2);}
.nav-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2);}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav-tabs{display:flex;gap:2px;}
.ntab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--txt2);border:none;background:none;transition:all .12s;}
.ntab:hover{background:#f3f4f6;color:var(--txt);}
.ntab.active{background:var(--vl);color:var(--vd);font-weight:500;}

.shell{display:flex;flex:1;overflow:hidden;}

.sidebar{width:210px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sb-head{padding:10px 14px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
.sb-section{padding:6px 14px 2px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;}
.sb-list{flex:1;overflow-y:auto;padding:4px 0;}
.sb-item{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--txt2);transition:all .12s;}
.sb-item:hover{background:#f9fafb;color:var(--txt);}
.sb-item.active{background:var(--vl);color:var(--vd);font-weight:500;}
.sb-badge{font-size:10px;padding:1px 5px;border-radius:8px;background:#f3f4f6;color:var(--txt3);}
.sb-item.active .sb-badge{background:var(--v);color:white;}
.sb-footer{padding:8px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--txt3);}
.sb-divider{height:1px;background:var(--border);margin:4px 0;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.view{display:none;flex:1;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}

/* CHAT */
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:76%;}
.msg-label{font-size:10px;font-weight:600;margin-bottom:3px;color:var(--txt3);}
.msg-label.sal{color:var(--v);}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;}
.msg.sal .msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 14px 14px 14px;color:var(--txt);}
.msg.usr{align-self:flex-end;}
.msg.usr .msg-bubble{background:var(--v);color:white;border-radius:14px 4px 14px 14px;}
.msg.usr .msg-label{text-align:right;}

.confirm-card{background:white;border:1.5px solid var(--v);border-radius:12px;padding:14px 16px;margin-top:10px;}
.confirm-title{font-size:12px;font-weight:600;color:var(--vd);margin-bottom:10px;}
.cf{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6;font-size:13px;}
.cf:last-of-type{border:none;}
.cfl{color:var(--txt2);}
.cfv{font-weight:500;color:var(--txt);text-align:right;max-width:200px;}
.confirm-actions{display:flex;gap:8px;margin-top:12px;}
.cbtn{flex:1;padding:8px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;}
.cbtn-ok{background:var(--v);color:white;}
.cbtn-ok:hover{background:var(--vd);}
.cbtn-no{background:#f3f4f6;color:var(--txt2);}

.input-bar{padding:10px 16px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0;}
.photo-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.photo-thumb{width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-ta{flex:1;padding:9px 13px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--f);resize:none;min-height:40px;max-height:100px;outline:none;color:var(--txt);}
.chat-ta:focus{border-color:var(--v);}
.ib{width:38px;height:38px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.ib-mic{background:var(--vl);}
.ib-mic.rec{background:var(--r);animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.4)}50%{box-shadow:0 0 0 8px rgba(226,75,74,0)}}
.ib-mic svg{fill:var(--v);}
.ib-mic.rec svg{fill:white;}
.ib-img{background:#f3f4f6;border:1px solid var(--border);}
.ib-img svg{fill:var(--txt2);}
.ib-send{background:var(--v);}
.ib-send:hover{background:var(--vd);}
.ib-send svg{fill:white;}
#photoInput{display:none;}

.view-head{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;flex-wrap:wrap;}
.vh-title{font-size:15px;font-weight:600;}
.vh-sub{font-size:12px;color:var(--txt2);margin-top:1px;}
.vh-filters{display:flex;gap:8px;flex-wrap:wrap;}
.fi{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--f);background:white;color:var(--txt);outline:none;}
.fi:focus{border-color:var(--v);}

.hist-body{flex:1;overflow-y:auto;padding:14px 20px;}
.tabla{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f9fafb;padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);}
td{padding:9px 12px;border-bottom:1px solid #f9fafb;color:var(--txt);vertical-align:top;}
tr:last-child td{border:none;}
tr:hover td{background:#fafafa;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;}
.bv{background:var(--vl);color:var(--vd);}
.br{background:var(--rl);color:#a32d2d;}
.ba{background:var(--al);color:#854f0b;}
.bg{background:#f3f4f6;color:var(--txt2);}
.pag{display:flex;gap:6px;justify-content:center;margin-top:12px;}
.pbtn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:white;font-size:12px;cursor:pointer;}
.pbtn.active{background:var(--v);color:white;border-color:var(--v);}

.prev-body{flex:1;overflow-y:auto;padding:14px 20px;}
.alert-row{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:8px;margin-bottom:6px;font-size:13px;}
.alert-warn{background:var(--al);border:1px solid #f0c060;}
.alert-crit{background:var(--rl);border:1px solid #f7c1c1;}

.dots{display:inline-flex;gap:3px;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--v);animation:d 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes d{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">
    <div class="nav-ico"><svg viewBox="0 0 24 24"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg></div>
    <div><div class="nav-name">Salvador</div><div class="nav-sub">Asistente Técnico · MISAGI S.A.C.</div></div>
  </div>
  <div class="nav-tabs">
    <button class="ntab active" onclick="switchView('chat',this)">💬 Asistente</button>
    <button class="ntab" onclick="switchView('historial',this)">📋 Historial</button>
    <button class="ntab" onclick="switchView('preventivo',this)">🔧 Preventivo</button>
  </div>
  <div class="nav-status">
    <div class="dot"></div>
    <span id="fbStatus">Conectando...</span>
  </div>
</div>

<div class="shell">
<div class="sidebar">
  <div class="sb-head">Flota MISAGI</div>
  <div class="sb-list" id="sbList"></div>
  <div class="sb-footer">
    <div id="sbTotal">— registros</div>
    <div id="sbSync">—</div>
  </div>
</div>

<div class="main">

  <!-- CHAT -->
  <div class="view active" id="view-chat">
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="input-bar">
      <div class="photo-strip hidden" id="photoStrip"></div>
      <div class="input-row">
        <button class="ib ib-mic" id="micBtn" onclick="toggleMic()" title="Hablar">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button class="ib ib-img" onclick="document.getElementById('photoInput').click()" title="Foto">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#6b7280" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
        </button>
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotos(this)">
        <textarea class="chat-ta" id="chatInput" placeholder="Habla o escribe — registra fallas, consulta historial, analiza fotos..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
        <button class="ib ib-send" onclick="sendMsg()">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="view" id="view-historial">
    <div class="view-head">
      <div><div class="vh-title">Historial de fallas</div><div class="vh-sub" id="histCount">Cargando...</div></div>
      <div class="vh-filters">
        <input class="fi" id="hSearch" placeholder="Buscar..." oninput="renderHist()" style="width:160px;">
        <select class="fi" id="hUnidad" onchange="renderHist()"><option value="">Todas las unidades</option></select>
        <select class="fi" id="hTipo" onchange="renderHist()">
          <option value="">Todos los tipos</option>
          <option>CORRECTIVO</option><option>SEGUIMIENTO</option><option>SERVICIO</option><option>GASTO OPERATIVO</option>
        </select>
      </div>
    </div>
    <div class="hist-body">
      <div class="tabla">
        <table>
          <thead><tr><th>Unidad</th><th>Fecha</th><th>KM</th><th>Descripción</th><th>Tipo</th><th>Estado</th><th>Costo</th></tr></thead>
          <tbody id="histTbody"></tbody>
        </table>
      </div>
      <div class="pag" id="histPag"></div>
    </div>
  </div>

  <!-- PREVENTIVO -->
  <div class="view" id="view-preventivo">
    <div class="view-head"><div><div class="vh-title">Mantenimiento Preventivo</div><div class="vh-sub">Alertas y próximos servicios por kilometraje</div></div></div>
    <div class="prev-body">
      <div id="alertasPrev" style="margin-bottom:14px;"></div>
      <div class="tabla">
        <table>
          <thead><tr><th>Unidad</th><th>KM Actual</th><th>Próximo MP</th><th>KM Restantes</th><th>Días est.</th><th>Estado</th></tr></thead>
          <tbody id="prevTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</div>

async function loadFB(){
  try{
    const q=query(collection(db,'fallas'),orderBy('fecha','desc'),limit(400));
    const snap=await getDocs(q);
    liveDB.fallas=snap.docs.map(d=>({fbId:d.id,...d.data()}))
      .filter(f=>PLACAS_OK.has(f.placa||f.unidad||''));
    document.getElementById('fbStatus').textContent=`Firebase · ${liveDB.fallas.length} fallas en vivo`;
    document.getElementById('sbSync').textContent='Sync: '+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
    buildSidebar(); renderHist(); renderPrev();
  }catch(e){
    document.getElementById('fbStatus').textContent='Modo local (sin Firebase)';
    buildSidebar(); renderHist(); renderPrev();
  }
}

// ── SIDEBAR ───────────────────────────────────────────────────
function buildSidebar(){
  const allF=[...HIST.fallas,...liveDB.fallas];
  const list=document.getElementById('sbList');
  list.innerHTML='';
  const hSel=document.getElementById('hUnidad');
  hSel.innerHTML='<option value="">Todas las unidades</option>';

  // Tractos
  const tDiv=document.createElement('div'); tDiv.className='sb-section'; tDiv.textContent='Tractos'; list.appendChild(tDiv);
  TRACTOS.forEach(p=>{
    const cnt=allF.filter(f=>(f.placa||f.unidad||'')===p).length;
    const div=mkSbItem(p,cnt,allF); list.appendChild(div);
    const o=document.createElement('option'); o.value=p; o.textContent=p; hSel.appendChild(o);
  });
  // Tolvas
  const tDiv2=document.createElement('div'); tDiv2.className='sb-section'; tDiv2.style.marginTop='6px'; tDiv2.textContent='Tolvas'; list.appendChild(tDiv2);
  TOLVAS.forEach(p=>{
    const cnt=allF.filter(f=>(f.placa||f.unidad||'')===p).length;
    const div=mkSbItem(p,cnt,allF); list.appendChild(div);
    const o=document.createElement('option'); o.value=p; o.textContent=p; hSel.appendChild(o);
  });

  document.getElementById('sbTotal').textContent=allF.length+' registros totales';
}

function mkSbItem(p,cnt,allF){
  const div=document.createElement('div');
  div.className='sb-item'+(p===chatUnit?' active':'');
  div.innerHTML=`<span>${p}</span><span class="sb-badge">${cnt}</span>`;
  div.onclick=()=>{
    document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
    div.classList.add('active'); chatUnit=p;
    switchView('chat',document.querySelector('.ntab'));
    document.querySelector('.ntab').classList.add('active');
  };
  return div;
}

// ── VIEWS ─────────────────────────────────────────────────────
window.switchView=function(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
};

// ── CHAT ──────────────────────────────────────────────────────
function addMsg(type,html,extras){
  const wrap=document.createElement('div'); wrap.className='msg '+type;
  const lbl=document.createElement('div'); lbl.className='msg-label '+type;
  lbl.textContent=type==='sal'?'Salvador':'Tú'; wrap.appendChild(lbl);
  const bub=document.createElement('div'); bub.className='msg-bubble';
  bub.innerHTML=fmt(html); wrap.appendChild(bub);
  if(extras?.photos?.length){
    const row=document.createElement('div'); row.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;';
    extras.photos.forEach(u=>{const img=document.createElement('img');img.className='photo-thumb';img.src=u;row.appendChild(img);});
    wrap.appendChild(row);
  }
  if(extras?.confirm) bub.appendChild(buildCC(extras.confirm));
  const msgs=document.getElementById('chatMsgs');
  msgs.appendChild(wrap); msgs.scrollTop=msgs.scrollHeight;
}

function fmt(s){
  return s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

function addTyping(){
  const msgs=document.getElementById('chatMsgs');
  const div=document.createElement('div'); div.className='msg sal'; div.id='typing';
  div.innerHTML='<div class="msg-label sal">Salvador</div><div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

// ── CONFIRM CARD ──────────────────────────────────────────────
function buildCC(data){
  const campos=[
    ['Unidad',data.placa],['Fecha',data.fecha],['KM',data.km?data.km+' km':null],
    ['Descripción',data.descripcion],['Diagnóstico',data.diagnostico],
    ['Acción correctiva',data.accionCorrectiva],
    ['Gravedad',data.gravedad],['Estado falla',data.estadoFalla],
    ['Costo',data.costo?'S/. '+data.costo:null],['Técnico',data.tecnico],
  ];
  const card=document.createElement('div'); card.className='confirm-card';
  card.innerHTML='<div class="confirm-title">📋 Confirma antes de guardar en Firebase</div>';
  campos.forEach(([l,v])=>{
    if(!v) return;
    const r=document.createElement('div'); r.className='cf';
    r.innerHTML=`<span class="cfl">${l}</span><span class="cfv">${v}</span>`;
    card.appendChild(r);
  });
  const acts=document.createElement('div'); acts.className='confirm-actions';
  const ok=document.createElement('button'); ok.className='cbtn cbtn-ok'; ok.textContent='✓ Guardar en Firebase';
  const no=document.createElement('button'); no.className='cbtn cbtn-no'; no.textContent='✕ Corregir';
  ok.onclick=()=>{saveToFB(data);card.remove();};
  no.onclick=()=>{card.remove();addMsg('sal','Dime qué datos quieres corregir y los actualizo.');pendingFalla=null;};
  acts.appendChild(ok); acts.appendChild(no); card.appendChild(acts);
  return card;
}

// ── GUARDAR FIREBASE ──────────────────────────────────────────
async function saveToFB(data){
  try{
    const ref=await addDoc(collection(db,'fallas'),{
      placa:data.placa||'',fecha:data.fecha||new Date().toISOString().slice(0,10),
      km:Number(data.km)||0,descripcion:data.descripcion||'',
      diagnostico:data.diagnostico||'',accionCorrectiva:data.accionCorrectiva||'',
      gravedad:data.gravedad||'',estadoFalla:data.estadoFalla||'ABIERTO',
      estado:data.estado||'OPERATIVO',costo:Number(data.costo)||0,
      tecnico:data.tecnico||'',fuente:'Salvador-voz',timestamp:serverTimestamp(),
    });
    liveDB.fallas.unshift({fbId:ref.id,...data,placa:data.placa||''});
    addMsg('sal',`✅ **Guardado en Firebase** (${ref.id.slice(0,8)}...)\n\n**${data.placa}** registrado correctamente. ¿Algo más?`);
    buildSidebar(); renderHist(); pendingFalla=null;
  }catch(e){
    addMsg('sal',`❌ Error Firebase: ${e.message}\n\nVerifica las reglas de Firestore.`);
  }
}

// ── CONTEXT ───────────────────────────────────────────────────
function buildCtx(placa){
  const allF=[...HIST.fallas,...liveDB.fallas];
  const fallas=placa?allF.filter(f=>(f.placa||f.unidad||'')===placa):allF.slice(-100);
  const prev=HIST.prev.filter(p=>!placa||p.placa===placa);
  const tracto=HIST.tractos.find(t=>t.placa===placa);

  let ctx=`ASISTENTE "SALVADOR" — MISAGI S.A.C., Arequipa Perú\nFlota normalizada: tractos (BWW-797,BWU-917,CDI-829,CDJ-712,CFF-841,CFG-704,BYV-826) + tolvas (ANF-995,Z3P-982,VGI-993)\nHistorial: ${allF.length} registros totales\n\n`;
  if(tracto) ctx+=`TRACTO ${placa}: Marca=${tracto.marca||'—'}, KM=${tracto.km?.toLocaleString?.()}, Estado=${tracto.estado}\n`;
  if(prev.length){
    ctx+='PREVENTIVO:\n';
    prev.slice(0,4).forEach(p=>ctx+=`  ${p.placa}: km_actual=${p.km_actual}, próx_MP=${p.km_mp}, estado=${p.estado}\n`);
  }
  ctx+=`\nHISTORIAL (${fallas.length} registros):\n`;
  fallas.slice(-100).forEach(f=>{
    const p=f.placa||f.unidad||''; const d=f.desc||f.descripcion||''; const di=f.diag||f.diagnostico||'';
    if(!d&&!di) return;
    ctx+=`[${f.fecha||'s/f'}|${p}|${f.km||0}km|${f.tipo||f.estadoFalla||''}] ${d}${di?' →'+di:''}\n`;
  });
  return ctx;
}

// ── SEND ──────────────────────────────────────────────────────
window.sendMsg=async function(){
  const inp=document.getElementById('chatInput');
  const txt=inp.value.trim();
  if(!txt&&!pendingPhotos.length) return;
  const photos=pendingPhotos.map(f=>URL.createObjectURL(f));
  addMsg('usr',txt||'(foto adjunta)',{photos:photos.length?photos:null});
  chatHistory.push({role:'user',content:txt||'Analiza esta imagen'});
  inp.value=''; pendingPhotos=[];
  document.getElementById('photoStrip').innerHTML='';
  document.getElementById('photoStrip').classList.add('hidden');
  addTyping();

  const sys=buildCtx(chatUnit)+`

INSTRUCCIONES DE SALVADOR:
Eres Salvador, asistente técnico experto de MISAGI S.A.C. Español directo y técnico.

MODO REGISTRO: Si el mecánico describe una falla para guardar, extrae los datos y responde EXACTAMENTE así (sin texto antes ni después):
REGISTRO_FALLA:{"placa":"","fecha":"YYYY-MM-DD","km":0,"descripcion":"","diagnostico":"","accionCorrectiva":"","gravedad":"BAJA|MEDIA|ALTA|CRÍTICA","estadoFalla":"ABIERTO","estado":"OPERATIVO","costo":0,"tecnico":""}

MODO CONSULTA: Responde con datos reales del historial. Incluye fechas, frecuencia, patrones.
MODO FOTO: Si hay imagen, diagnóstico visual técnico.
MODO PREDICCIÓN: Estima próxima falla por km basado en historial.

Si faltan datos clave para registro (placa, descripción), pide solo esos.
Respuestas concisas y directas.`;

  try{
    const msgs=[...chatHistory];
    msgs[msgs.length-1]={role:'user',content:sys+'\n\nMECÁNICO: '+(txt||'analiza imagen')};
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:msgs})});
    const data=await res.json();
    const reply=data.content?.map(c=>c.text||'').join('')||'Sin respuesta';
    document.getElementById('typing')?.remove();

    if(reply.includes('REGISTRO_FALLA:')){
      try{
        const raw=reply.split('REGISTRO_FALLA:')[1].trim();
        const falla=JSON.parse(raw);
        // Si no tiene fecha, poner hoy
        if(!falla.fecha) falla.fecha=new Date().toISOString().slice(0,10);
        pendingFalla=falla;
        addMsg('sal','Antes de guardar en Firebase, confirma:',{confirm:falla});
        chatHistory.push({role:'assistant',content:'[confirmación pendiente]'});
        return;
      }catch(_){}
    }
    addMsg('sal',reply);
    chatHistory.push({role:'assistant',content:reply});
    if(chatHistory.length>16) chatHistory=chatHistory.slice(-16);
  }catch(e){
    document.getElementById('typing')?.remove();
    addMsg('sal','Error de conexión. Verifica tu red.');
  }
};

  if(!isRec){

    recognition=new SR(); recognition.lang='es-PE';
    recognition.continuous=true; recognition.interimResults=true;
    recognition.onresult=e=>{let t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;document.getElementById('chatInput').value=t;};
    recognition.onerror=()=>stopMic();
    recognition.onend=()=>{if(isRec)recognition.start();};
    recognition.start(); isRec=true;
    document.getElementById('micBtn').classList.add('rec');
  }else stopMic();
};
function stopMic(){recognition?.stop();isRec=false;document.getElementById('micBtn').classList.remove('rec');}

window.handlePhotos=function(input){
  pendingPhotos=[...input.files];
  const strip=document.getElementById('photoStrip');
  strip.innerHTML=''; strip.classList.remove('hidden');
  pendingPhotos.forEach(f=>{const img=document.createElement('img');img.className='photo-thumb';img.src=URL.createObjectURL(f);strip.appendChild(img);});
};

// ── HISTORIAL ─────────────────────────────────────────────────
window.renderHist=function(){
  const all=[...HIST.fallas,...liveDB.fallas];
  const s=document.getElementById('hSearch').value.toLowerCase();
  const u=document.getElementById('hUnidad').value;
  const t=document.getElementById('hTipo').value;
  let f=all.filter(r=>{
    const p=r.placa||r.unidad||'';
    const d=(r.desc||r.descripcion||'').toLowerCase();
    if(u&&p!==u)return false;
    if(t&&(r.tipo||'')!==t)return false;
    if(s&&!(p+' '+d).includes(s))return false;
    return true;
  }).sort((a,b)=>(b.fecha||'')>(a.fecha||'')?1:-1);
  document.getElementById('histCount').textContent=f.length+' registros';
  const page=f.slice(histPage*PER,(histPage+1)*PER);
  document.getElementById('histTbody').innerHTML=page.map(r=>{
    const p=r.placa||r.unidad||'—';
    const d=r.desc||r.descripcion||'—';
    const tp=r.tipo||r.estadoFalla||'—';
    const tpcls=tp==='CORRECTIVO'?'br':tp==='SEGUIMIENTO'?'ba':tp==='SERVICIO'?'bv':'bg';
    const est=r.estatus||r.estadoFalla||r.estado||'—';
    const estcls=est==='ABIERTO'||est==='Pendiente'?'br':est==='Levantado'||est==='Normal'?'bv':'bg';
    const costo=r.costo?'S/. '+Number(r.costo).toLocaleString():'—';
    return`<tr><td><strong>${p}</strong></td><td style="white-space:nowrap">${r.fecha||'—'}</td><td style="white-space:nowrap">${r.km?Number(r.km).toLocaleString()+'km':'—'}</td><td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.replace(/"/g,'')}">${d}</td><td><span class="badge ${tpcls}">${tp}</span></td><td><span class="badge ${estcls}">${est}</span></td><td style="white-space:nowrap">${costo}</td></tr>`;
  }).join('');
  const pages=Math.ceil(f.length/PER);
  const pag=document.getElementById('histPag'); pag.innerHTML='';
  for(let i=0;i<Math.min(pages,8);i++){
    const b=document.createElement('button'); b.className='pbtn'+(i===histPage?' active':'');
    b.textContent=i+1; const pi=i; b.onclick=()=>{histPage=pi;renderHist();};
    pag.appendChild(b);
  }
};

// ── PREVENTIVO ────────────────────────────────────────────────
function renderPrev(){
  const KM=310;
  const byP={};
  HIST.prev.forEach(p=>{if(!byP[p.placa]||(p.km_actual>(byP[p.placa].km_actual||0)))byP[p.placa]=p;});
  const rows=Object.values(byP).filter(p=>PLACAS_OK.has(p.placa)).sort((a,b)=>((a.km_mp||0)-(a.km_actual||0))-((b.km_mp||0)-(b.km_actual||0)));
  let alertas='';
  document.getElementById('prevTbody').innerHTML=rows.map(p=>{
    const rest=(p.km_mp||0)-(p.km_actual||0);
    const dias=Math.round(rest/KM);
    let cls='bv',txt='OK';
    if(rest<0){cls='br';txt='VENCIDO';alertas+=`<div class="alert-row alert-crit">🔴 <strong>${p.placa}</strong>: MP vencido hace ~${Math.abs(dias)} días</div>`;}
    else if(rest<5000){cls='ba';txt='PRÓXIMO';alertas+=`<div class="alert-row alert-warn">🟡 <strong>${p.placa}</strong>: ${rest.toLocaleString()} km restantes (~${dias} días)</div>`;}
    return`<tr><td><strong>${p.placa}</strong></td><td>${(p.km_actual||0).toLocaleString()} km</td><td>${(p.km_mp||0).toLocaleString()} km</td><td>${rest>0?rest.toLocaleString()+'km':'-'+Math.abs(rest).toLocaleString()+'km'}</td><td>${dias>0?dias+' días':'vencido'}</td><td><span class="badge ${cls}">${txt}</span></td></tr>`;
  }).join('');
  document.getElementById('alertasPrev').innerHTML=alertas;
}
